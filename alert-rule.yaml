apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sensor-alerts
  labels:
    release: monitoring
spec:
  groups:
  - name: sensor.rules
    rules:

    - alert: HighCPUUsage
      expr: cpu_usage_percent > 60
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "High CPU Usage detected"
        description: "CPU usage is above 70%"

    - alert: HighMemoryUsage
      expr: memory_usage_percent > 60
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "High Memory Usage detected"
        description: "Memory usage is above 80%"